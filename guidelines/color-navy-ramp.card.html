<!-- @dsCard group="Colors" viewport="700x120" name="NAVY Ramp" subtitle="--navy-50 → --navy-900 (700 = base #1F3864)" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-mono);padding:18px;display:flex;gap:4px}
.sw{flex:1;height:80px;border-radius:5px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;color:#fff}
.sw.dk{color:var(--navy)}
</style></head><body>
<div class="sw dk" style="background:var(--navy-50)">50</div>
<div class="sw dk" style="background:var(--navy-100)">100</div>
<div class="sw dk" style="background:var(--navy-200)">200</div>
<div class="sw dk" style="background:var(--navy-300)">300</div>
<div class="sw" style="background:var(--navy-400)">400</div>
<div class="sw" style="background:var(--navy-500)">500</div>
<div class="sw" style="background:var(--navy-600)">600</div>
<div class="sw" style="background:var(--navy-700);outline:2px solid var(--ink);outline-offset:1px">700</div>
<div class="sw" style="background:var(--navy-800)">800</div>
<div class="sw" style="background:var(--navy-900)">900</div>
</body></html>
