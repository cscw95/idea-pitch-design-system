<!-- @dsCard group="Colors" viewport="700x170" name="Core Palette" subtitle="NAVY 지배 + SKY 보조 + RED 포인트" -->
<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--bg-app);font-family:var(--font-sans);padding:18px;display:flex;gap:12px}
.sw{flex:1;height:130px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff}
.n{font-weight:800;font-size:14px}.h{font-family:var(--font-mono);font-size:11px;opacity:.85;margin-top:2px}
</style></head><body>
<div class="sw" style="background:var(--navy)"><div class="n">NAVY</div><div class="h">#1F3864 · --navy</div></div>
<div class="sw" style="background:var(--blue)"><div class="n">BLUE</div><div class="h">#1273C4 · --blue</div></div>
<div class="sw" style="background:var(--sky);color:var(--navy)"><div class="n">SKY</div><div class="h">#DCE7F2 · --sky</div></div>
<div class="sw" style="background:var(--steel)"><div class="n">STEEL</div><div class="h">#8C96A0 · --steel</div></div>
<div class="sw" style="background:var(--red)"><div class="n">RED</div><div class="h">#C00000 · --red</div></div>
</body></html>
