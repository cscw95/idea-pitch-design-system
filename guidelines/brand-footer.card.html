<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-tint);font-family:var(--font-sans);padding:20px}
.slidebottom{background:#fff;border:1px solid var(--border-subtle);border-radius:8px;padding:16px 24px 14px;position:relative}
.bar{background:var(--navy);border-radius:10px;color:#fff;font-weight:800;font-size:14px;height:34px;display:flex;align-items:center;justify-content:center}
.footer{margin-top:16px;padding-top:10px;border-top:1px solid var(--footer-line);display:flex;align-items:center;justify-content:space-between}
.footer img{height:18px;display:block}
.pg{font-size:12px;font-weight:700;color:var(--text-muted);display:flex;gap:14px}
.src{font-weight:400}
</style></head><body>
<div class="slidebottom">
  <div class="bar">④ Takeaway Bar</div>
  <div class="footer">
    <img src="../assets/skt-logo.svg" alt="SK telecom"/>
    <div class="pg"><span class="src">출처: 내부 분석</span><span>03 / 12</span></div>
  </div>
</div>
</body></html>
