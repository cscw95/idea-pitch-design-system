<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="../styles.css"/>
<style>
body{margin:0;background:var(--surface-tint);font-family:var(--font-sans);padding:20px}
.crop{background:#fff;border:1px solid var(--border-subtle);border-radius:8px;padding:18px 24px 14px;position:relative}
.head{display:flex;align-items:baseline;gap:12px}
.deck{font-size:24px;font-weight:800}
.sep{font-size:22px;color:var(--text-muted)}
.sec{font-size:22px;font-weight:800}
.subtitle{position:absolute;right:24px;top:24px;font-size:13px;font-weight:700;color:var(--text-muted)}
.rule{margin-top:14px;height:2px;background:var(--ink)}
</style></head><body>
<div class="crop">
  <div class="subtitle">2026 사업전략 보고 · Confidential</div>
  <div class="head"><span class="deck">Idea Pitch</span><span class="sep">|</span><span class="sec">① 상황 인식</span></div>
  <div class="rule"></div>
</div>
</body></html>
