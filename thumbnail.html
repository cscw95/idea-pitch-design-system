<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><link rel="stylesheet" href="styles.css"/>
<style>
html,body{margin:0}
.tile{width:1280px;height:854px;display:flex;font-family:var(--font-sans)}
.main{width:75%;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.main .name{color:#fff;font-weight:800;font-size:150px;line-height:.95;letter-spacing:-2px}
.main .sub{color:var(--navy-200);font-weight:800;font-size:44px;letter-spacing:10px}
.strip{width:25%;display:flex;flex-direction:column}
.strip > div{flex:1}
</style></head><body>
<div class="tile">
  <div class="main">
    <div class="name">Idea<br/>Pitch</div>
    <div class="sub">SKT</div>
  </div>
  <div class="strip">
    <div style="background:var(--sky)"></div>
    <div style="background:var(--skt-orange)"></div>
    <div style="background:var(--skt-red)"></div>
    <div style="background:var(--blue)"></div>
  </div>
</div>
</body></html>
